<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Design Engine Shell</title>
  <!-- Cache-bust tag — bump on each engine release. Build script may replace with git short SHA. -->
  <link rel="stylesheet" href="./interior-design-engine.css?v=20260518">
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f6f0e8;
    }

    body {
      overflow: auto;
    }

    #app {
      min-height: 100vh;
    }

    .ide-shell-state {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #493829;
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="ide-shell-state">Đang chờ model thiết kế...</div>
  </div>

  <script type="module" src="./interior-design-engine.js?v=20260518"></script>
  <script type="module">
    const tabs = ["front", "side", "plan", "3d", "specs"];
    let currentModel = null;
    let currentLanguage = "vi";

    function renderModel(model) {
      if (!window.InteriorDesigner) return;
      if (model) currentModel = model;
      if (!currentModel) return;
      window.InteriorDesigner.render({
        mount: "#app",
        tabs,
        model: currentModel,
        language: currentLanguage
      });
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type === "APPLY_MODEL") {
        renderModel(data.model);
      } else if (data.type === "SET_LANGUAGE" && (data.lang === "vi" || data.lang === "en")) {
        currentLanguage = data.lang;
        if (currentModel) renderModel(currentModel);
      }
    });

    window.parent?.postMessage({ type: "INTERIOR_SHELL_READY" }, "*");
  </script>
</body>
</html>
