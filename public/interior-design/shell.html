<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Design Engine Shell</title>
  <link rel="stylesheet" href="./interior-design-engine.css">
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f6f0e8;
    }

    body {
      overflow: auto;
    }

    #app {
      min-height: 100vh;
    }

    .ide-shell-state {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #493829;
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="ide-shell-state">Đang chờ model thiết kế...</div>
  </div>

  <script src="./interior-design-engine.js"></script>
  <script>
    const tabs = ["front", "side", "plan", "3d", "specs"];

    function renderModel(model) {
      if (!window.InteriorDesigner || !model) return;
      window.InteriorDesigner.render({
        mount: "#app",
        tabs,
        model
      });
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type === "APPLY_MODEL") {
        renderModel(data.model);
      }
    });

    window.parent?.postMessage({ type: "INTERIOR_SHELL_READY" }, "*");
  </script>
</body>
</html>
