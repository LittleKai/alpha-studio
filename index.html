<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/alpha-logo-2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Studio — AI Academy & Training Hub</title>
    <meta name="description" content="Học AI thực chiến cùng Alpha Studio. Khóa học AI sáng tạo, công cụ AI Studio chuyên nghiệp, và cộng đồng freelancer hàng đầu Việt Nam." />
    <meta property="og:title" content="Alpha Studio — AI Academy & Training Hub" />
    <meta property="og:description" content="Học AI thực chiến cùng Alpha Studio. Khóa học AI sáng tạo, công cụ AI Studio chuyên nghiệp, và cộng đồng freelancer hàng đầu Việt Nam." />
    <meta property="og:image" content="https://giaiphapsangtao.com/alpha-logo-2.png" />
    <meta property="og:url" content="https://giaiphapsangtao.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Alpha Studio" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://alpha-studio-backend.fly.dev" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts - Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      /* Dark Theme (Default) */
      :root {
        --bg-primary: #050a18;
        --bg-secondary: #0c162d;
        --bg-card: #121e3d;
        --bg-card-alpha: rgba(18, 30, 61, 0.7);

        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --text-tertiary: #64748b;

        --border-primary: rgba(30, 64, 175, 0.3);

        --accent-primary: #00d4ff;
        --accent-secondary: #3b82f6;
        --accent-primary-hover: #00b4d8;
        --accent-shadow: rgba(0, 212, 255, 0.25);

        --text-on-accent: #050a18;

        --bg-error: rgba(239, 68, 68, 0.1);
        --border-error: #ef4444;
        --text-error: #fca5a5;
      }

      /* Light Theme */
      html[data-theme="light"] {
        --bg-primary: #f8fafc;
        --bg-secondary: #e2e8f0;
        --bg-tertiary: #cbd5e1;
        --bg-card: #ffffff;
        --bg-card-alpha: rgba(255, 255, 255, 0.9);

        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-tertiary: #64748b;

        --border-primary: rgba(15, 23, 42, 0.1);
        --border-secondary: rgba(15, 23, 42, 0.15);

        --accent-primary: #0ea5e9;
        --accent-secondary: #0284c7;
        --accent-primary-hover: #0284c7;
        --accent-shadow: rgba(14, 165, 233, 0.2);

        --text-on-accent: #ffffff;

        --bg-error: rgba(239, 68, 68, 0.1);
        --border-error: #ef4444;
        --text-error: #dc2626;

        --hero-text: #0f172a;
        --card-shadow: rgba(15, 23, 42, 0.08);
        --overlay-gradient: linear-gradient(to top, rgba(248, 250, 252, 0.95), transparent);
      }

      /* Dark theme specific vars */
      :root {
        --bg-tertiary: #1a2744;
        --border-secondary: rgba(30, 64, 175, 0.5);
        --hero-text: #ffffff;
        --card-shadow: rgba(0, 0, 0, 0.3);
        --overlay-gradient: linear-gradient(to top, rgba(5, 10, 24, 0.95), transparent);
      }

      /* Global Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
        min-height: 100vh;
      }

      /* TinyMCE Content Rendering Fix
         Tailwind CDN preflight resets ul/ol list-style to none.
         Use .tinymce-content on any container rendering TinyMCE HTML. */
      .tinymce-content ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin: 0.5rem 0;
      }
      .tinymce-content ol {
        list-style-type: decimal;
        padding-left: 1.5rem;
        margin: 0.5rem 0;
      }
      .tinymce-content ul ul { list-style-type: circle; }
      .tinymce-content ul ul ul { list-style-type: square; }
      .tinymce-content li { margin: 0.2rem 0; }
      .tinymce-content p { margin: 0.4rem 0; }
      .tinymce-content h1, .tinymce-content h2,
      .tinymce-content h3, .tinymce-content h4 {
        font-weight: 700;
        margin: 1rem 0 0.4rem;
        color: var(--text-primary);
      }
      .tinymce-content h1 { font-size: 1.75rem; }
      .tinymce-content h2 { font-size: 1.5rem; }
      .tinymce-content h3 { font-size: 1.25rem; }
      .tinymce-content h4 { font-size: 1.1rem; }
      .tinymce-content img { border-radius: 0.75rem; max-width: 100%; height: auto; }
      .tinymce-content a { color: var(--accent-primary); text-decoration: underline; }
      .tinymce-content blockquote {
        border-left: 4px solid var(--accent-primary);
        padding-left: 1rem;
        font-style: italic;
        margin: 0.5rem 0;
      }
      .tinymce-content table { width: 100%; border-collapse: collapse; }
      .tinymce-content th {
        background: var(--bg-secondary);
        padding: 0.5rem;
        text-align: left;
      }
      .tinymce-content td {
        padding: 0.5rem;
        border: 1px solid var(--border-primary);
      }

      /* Glass Card Effect */
      .glass-card {
        background: var(--bg-card-alpha);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-primary);
      }

      /* Text Gradient */
      .text-gradient {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--bg-card);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-primary);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeInFast {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      .animate-fade-in-fast {
        animation: fadeInFast 0.2s ease-out;
      }

      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .animate-spin {
        animation: spin 1s linear infinite;
      }

      /* Button Styles */
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        color: var(--text-on-accent);
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px var(--accent-shadow);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: var(--bg-card);
        color: var(--text-primary);
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 1px solid var(--border-primary);
        cursor: pointer;
      }

      .btn-secondary:hover {
        background: var(--bg-secondary);
        border-color: var(--accent-primary);
      }

      /* Input Styles */
      .input-field {
        background: var(--bg-card);
        border: 1px solid var(--border-primary);
        color: var(--text-primary);
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        width: 100%;
        transition: all 0.3s ease;
      }

      .input-field:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-shadow);
      }

      .input-field::placeholder {
        color: var(--text-tertiary);
      }

      /* Card Hover Effect */
      .card-hover {
        transition: all 0.3s ease;
      }

      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px var(--card-shadow);
      }

      /* Light Theme Specific Overrides */
      html[data-theme="light"] .glass-card {
        background: var(--bg-card-alpha);
        border: 1px solid var(--border-primary);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }

      /* Light theme scrollbar */
      html[data-theme="light"] ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }

      html[data-theme="light"] ::-webkit-scrollbar-thumb {
        background: var(--bg-tertiary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
