<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/alpha-logo-2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Studio — AI Academy & Training Hub</title>
    <meta name="description" content="Học AI thực chiến cùng Alpha Studio. Khóa học AI sáng tạo, công cụ AI Studio chuyên nghiệp, và cộng đồng freelancer hàng đầu Việt Nam." />
    <meta property="og:title" content="Alpha Studio — AI Academy & Training Hub" />
    <meta property="og:description" content="Học AI thực chiến cùng Alpha Studio. Khóa học AI sáng tạo, công cụ AI Studio chuyên nghiệp, và cộng đồng freelancer hàng đầu Việt Nam." />
    <meta property="og:image" content="https://giaiphapsangtao.com/alpha-logo-2.png" />
    <meta property="og:url" content="https://giaiphapsangtao.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Alpha Studio" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://alpha-studio-backend.fly.dev" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts - Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      /* Dark Theme (Default) */
      :root {
        --bg-primary: #07111f;
        --bg-secondary: rgba(16, 31, 53, 0.72);
        --bg-card: rgba(17, 34, 58, 0.58);
        --bg-card-alpha: rgba(18, 35, 59, 0.46);
        --glass-highlight: rgba(255, 255, 255, 0.2);
        --glass-edge: rgba(255, 255, 255, 0.1);
        --glass-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
        --liquid-accent-bg: linear-gradient(135deg, rgba(97, 232, 255, 0.46), rgba(139, 125, 255, 0.34));
        --liquid-blue-bg: linear-gradient(135deg, rgba(59, 130, 246, 0.34), rgba(97, 232, 255, 0.22));
        --liquid-green-bg: linear-gradient(135deg, rgba(34, 197, 94, 0.3), rgba(20, 184, 166, 0.2));
        --liquid-purple-bg: linear-gradient(135deg, rgba(147, 51, 234, 0.34), rgba(236, 72, 153, 0.2));
        --liquid-neutral-bg: linear-gradient(135deg, rgba(148, 163, 184, 0.18), rgba(255, 255, 255, 0.08));

        --text-primary: #f8fafc;
        --text-secondary: #b7c6d8;
        --text-tertiary: #7e8fa6;

        --border-primary: rgba(205, 235, 255, 0.18);

        --accent-primary: #61e8ff;
        --accent-secondary: #8b7dff;
        --accent-primary-hover: #35d7f4;
        --accent-shadow: rgba(97, 232, 255, 0.28);

        --text-on-accent: #ffffff;

        --bg-error: rgba(239, 68, 68, 0.1);
        --border-error: #ef4444;
        --text-error: #fca5a5;
      }

      /* Light Theme */
      html[data-theme="light"] {
        --bg-primary: #eef7fb;
        --bg-secondary: rgba(255, 255, 255, 0.68);
        --bg-tertiary: rgba(210, 228, 238, 0.76);
        --bg-card: rgba(255, 255, 255, 0.68);
        --bg-card-alpha: rgba(255, 255, 255, 0.52);
        --glass-highlight: rgba(255, 255, 255, 0.9);
        --glass-edge: rgba(255, 255, 255, 0.58);
        --glass-shadow: 0 24px 70px rgba(29, 78, 116, 0.16);
        --liquid-accent-bg: linear-gradient(135deg, rgba(2, 132, 199, 0.62), rgba(124, 58, 237, 0.5));
        --liquid-blue-bg: linear-gradient(135deg, rgba(37, 99, 235, 0.5), rgba(14, 165, 233, 0.32));
        --liquid-green-bg: linear-gradient(135deg, rgba(22, 163, 74, 0.44), rgba(13, 148, 136, 0.28));
        --liquid-purple-bg: linear-gradient(135deg, rgba(124, 58, 237, 0.46), rgba(219, 39, 119, 0.28));
        --liquid-neutral-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.68), rgba(226, 232, 240, 0.34));

        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-tertiary: #64748b;

        --border-primary: rgba(15, 75, 112, 0.16);
        --border-secondary: rgba(15, 75, 112, 0.22);

        --accent-primary: #0284c7;
        --accent-secondary: #7c3aed;
        --accent-primary-hover: #0369a1;
        --accent-shadow: rgba(2, 132, 199, 0.22);

        --text-on-accent: #ffffff;

        --bg-error: rgba(239, 68, 68, 0.1);
        --border-error: #ef4444;
        --text-error: #dc2626;

        --hero-text: #0f172a;
        --card-shadow: rgba(15, 23, 42, 0.08);
        --overlay-gradient: linear-gradient(to top, rgba(248, 250, 252, 0.95), transparent);
      }

      /* Dark theme specific vars */
      :root {
        --bg-tertiary: rgba(27, 47, 75, 0.78);
        --border-secondary: rgba(205, 235, 255, 0.28);
        --hero-text: #ffffff;
        --card-shadow: rgba(0, 0, 0, 0.3);
        --overlay-gradient: linear-gradient(to top, rgba(5, 10, 24, 0.95), transparent);
      }

      /* Global Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
        min-height: 100vh;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          radial-gradient(circle at 12% 12%, rgba(97, 232, 255, 0.24), transparent 28rem),
          radial-gradient(circle at 82% 6%, rgba(139, 125, 255, 0.22), transparent 26rem),
          radial-gradient(circle at 72% 82%, rgba(20, 184, 166, 0.16), transparent 30rem),
          linear-gradient(135deg, #07111f 0%, #0a1628 44%, #12133d 100%);
      }

      html[data-theme="light"] body::before {
        background:
          radial-gradient(circle at 10% 10%, rgba(125, 211, 252, 0.54), transparent 28rem),
          radial-gradient(circle at 82% 8%, rgba(196, 181, 253, 0.48), transparent 26rem),
          radial-gradient(circle at 70% 86%, rgba(153, 246, 228, 0.42), transparent 30rem),
          linear-gradient(135deg, #eef7fb 0%, #f8fbff 48%, #eef2ff 100%);
      }

      /* TinyMCE Content Rendering Fix
         Tailwind CDN preflight resets ul/ol list-style to none.
         Use .tinymce-content on any container rendering TinyMCE HTML. */
      .tinymce-content ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin: 0.5rem 0;
      }
      .tinymce-content ol {
        list-style-type: decimal;
        padding-left: 1.5rem;
        margin: 0.5rem 0;
      }
      .tinymce-content ul ul { list-style-type: circle; }
      .tinymce-content ul ul ul { list-style-type: square; }
      .tinymce-content li { margin: 0.2rem 0; }
      .tinymce-content p { margin: 0.4rem 0; }
      .tinymce-content h1, .tinymce-content h2,
      .tinymce-content h3, .tinymce-content h4 {
        font-weight: 700;
        margin: 1rem 0 0.4rem;
        color: var(--text-primary);
      }
      .tinymce-content h1 { font-size: 1.75rem; }
      .tinymce-content h2 { font-size: 1.5rem; }
      .tinymce-content h3 { font-size: 1.25rem; }
      .tinymce-content h4 { font-size: 1.1rem; }
      .tinymce-content img { border-radius: 0.75rem; max-width: 100%; height: auto; }
      .tinymce-content a { color: var(--accent-primary); text-decoration: underline; }
      .tinymce-content blockquote {
        border-left: 4px solid var(--accent-primary);
        padding-left: 1rem;
        font-style: italic;
        margin: 0.5rem 0;
      }
      .tinymce-content table { width: 100%; border-collapse: collapse; }
      .tinymce-content th {
        background: var(--bg-secondary);
        padding: 0.5rem;
        text-align: left;
      }
      .tinymce-content td {
        padding: 0.5rem;
        border: 1px solid var(--border-primary);
      }

      /* Glass Card Effect */
      .glass-card {
        background: var(--bg-card-alpha);
        backdrop-filter: blur(26px) saturate(165%);
        -webkit-backdrop-filter: blur(26px) saturate(165%);
        border: 1px solid var(--border-primary);
        box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-highlight), inset 0 -1px 0 rgba(255, 255, 255, 0.04);
        position: relative;
      }

      .glass-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background: linear-gradient(145deg, var(--glass-highlight), transparent 34%, transparent 68%, var(--glass-edge));
        opacity: 0.45;
      }

      :is(article, aside, div, form, header, nav, section)[class*="bg-[var(--bg-card)]"][class*="rounded"]:not(.glass-card),
      :is(article, aside, div, form, header, nav, section)[class*="bg-[var(--bg-secondary)]"][class*="border"][class*="rounded"]:not(.glass-card),
      :is(article, aside, div, form, section)[class*="bg-[var(--bg-primary)]"][class*="rounded"][class*="shadow"]:not(.glass-card) {
        background: var(--bg-card-alpha) !important;
        backdrop-filter: blur(24px) saturate(160%);
        -webkit-backdrop-filter: blur(24px) saturate(160%);
        border-color: var(--border-primary) !important;
        box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-highlight), inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      }

      :is(input, select, textarea)[class*="bg-[var(--bg-secondary)]"],
      :is(input, select, textarea)[class*="bg-[var(--bg-primary)]"] {
        background: var(--bg-card-alpha) !important;
        backdrop-filter: blur(18px) saturate(145%);
        -webkit-backdrop-filter: blur(18px) saturate(145%);
        box-shadow: inset 0 1px 0 var(--glass-highlight);
      }

      :is(button, a, label)[class*="bg-[var(--accent-primary)]"],
      :is(button, a, label)[class*="bg-blue-500"],
      :is(button, a, label)[class*="bg-sky-500"],
      :is(button, a, label)[class*="bg-cyan-500"],
      :is(button, a, label)[class*="bg-green-500"],
      :is(button, a, label)[class*="bg-orange-500"],
      :is(button, a, label)[class*="bg-red-500"],
      :is(button, a, label)[class*="bg-purple-500"],
      :is(button, a, label)[class*="bg-purple-600"],
      :is(button, a, label)[class*="bg-gray-500"],
      :is(button, a, label)[class*="bg-[var(--bg-secondary)]"],
      :is(button, a, label)[class*="bg-[var(--bg-tertiary)]"],
      :is(button, a, label)[class*="bg-gradient"] {
        backdrop-filter: blur(18px) saturate(155%);
        -webkit-backdrop-filter: blur(18px) saturate(155%);
        border: 1px solid var(--border-primary);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.14), inset 0 1px 0 var(--glass-highlight);
      }

      :is(button, a, label)[class*="bg-[var(--accent-primary)]"],
      :is(button, a, label)[class*="bg-blue-500"],
      :is(button, a, label)[class*="bg-sky-500"],
      :is(button, a, label)[class*="bg-cyan-500"],
      :is(button, a, label)[class*="bg-green-500"],
      :is(button, a, label)[class*="bg-orange-500"],
      :is(button, a, label)[class*="bg-red-500"],
      :is(button, a, label)[class*="bg-purple-500"],
      :is(button, a, label)[class*="bg-purple-600"],
      :is(button, a, label)[class*="bg-gray-500"],
      :is(button, a, label)[class*="bg-gradient"] {
        color: #ffffff !important;
      }

      :is(button, a, label)[class*="bg-[var(--accent-primary)]"] {
        background: var(--liquid-accent-bg) !important;
      }

      :is(button, a, label)[class*="bg-blue-500"],
      :is(button, a, label)[class*="bg-sky-500"],
      :is(button, a, label)[class*="bg-cyan-500"] {
        background: var(--liquid-blue-bg) !important;
      }

      :is(button, a, label)[class*="bg-green-500"] {
        background: var(--liquid-green-bg) !important;
      }

      :is(button, a, label)[class*="bg-orange-500"],
      :is(button, a, label)[class*="bg-red-500"] {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.5), rgba(249, 115, 22, 0.34)) !important;
      }

      :is(button, a, label)[class*="bg-purple-500"],
      :is(button, a, label)[class*="bg-purple-600"] {
        background: var(--liquid-purple-bg) !important;
      }

      :is(button, a, label)[class*="bg-gray-500"],
      :is(button, a, label)[class*="bg-[var(--bg-secondary)]"],
      :is(button, a, label)[class*="bg-[var(--bg-tertiary)]"] {
        background: var(--liquid-neutral-bg) !important;
      }

      :is(button, a, label)[class*="bg-[var(--bg-secondary)]"],
      :is(button, a, label)[class*="bg-[var(--bg-tertiary)]"] {
        color: var(--text-primary) !important;
      }

      .liquid-cta-hover {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        transform: translateZ(0);
      }

      .liquid-cta-hover::after {
        content: '';
        position: absolute;
        inset: -45% -80%;
        z-index: -1;
        background:
          linear-gradient(115deg, transparent 35%, rgba(255, 255, 255, 0.7) 48%, transparent 62%),
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.28), transparent 42%);
        transform: translateX(-70%) rotate(8deg);
        opacity: 0;
        transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
      }

      .liquid-cta-hover:hover {
        transform: translateY(-4px) scale(1.035);
        border-color: var(--accent-primary) !important;
        box-shadow:
          0 18px 48px var(--accent-shadow),
          0 0 0 1px rgba(255, 255, 255, 0.18),
          inset 0 1px 0 var(--glass-highlight);
      }

      .liquid-cta-hover:hover::after {
        transform: translateX(70%) rotate(8deg);
        opacity: 1;
      }

      .liquid-cta-hover:active {
        transform: translateY(-1px) scale(0.99);
      }

      /* Text Gradient */
      .text-gradient {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--bg-card);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-primary);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeInFast {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      .animate-fade-in-fast {
        animation: fadeInFast 0.2s ease-out;
      }

      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .animate-spin {
        animation: spin 1s linear infinite;
      }

      /* Button Styles */
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        color: var(--text-on-accent);
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
        box-shadow: 0 12px 34px var(--accent-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px var(--accent-shadow);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: var(--bg-card-alpha);
        color: var(--text-primary);
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 1px solid var(--border-primary);
        cursor: pointer;
        backdrop-filter: blur(18px) saturate(150%);
        -webkit-backdrop-filter: blur(18px) saturate(150%);
        box-shadow: inset 0 1px 0 var(--glass-highlight);
      }

      .btn-secondary:hover {
        background: var(--bg-secondary);
        border-color: var(--accent-primary);
      }

      /* Input Styles */
      .input-field {
        background: var(--bg-card-alpha);
        border: 1px solid var(--border-primary);
        color: var(--text-primary);
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        width: 100%;
        transition: all 0.3s ease;
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
      }

      .input-field:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-shadow);
      }

      .input-field::placeholder {
        color: var(--text-tertiary);
      }

      /* Card Hover Effect */
      .card-hover {
        transition: all 0.3s ease;
      }

      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px var(--card-shadow);
      }

      /* Light Theme Specific Overrides */
      html[data-theme="light"] .glass-card {
        background: var(--bg-card-alpha);
        border: 1px solid var(--border-primary);
        box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-highlight), inset 0 -1px 0 rgba(255, 255, 255, 0.3);
      }

      .bg-\[var\(--accent-primary\)\].text-black,
      .hover\:bg-\[var\(--accent-primary\)\]:hover.hover\:text-black:hover,
      .bg-\[var\(--accent-primary\)\].text-\[var\(--text-on-accent\)\],
      .bg-gradient-to-r.text-\[var\(--text-on-accent\)\],
      .bg-gradient-to-br.text-\[var\(--text-on-accent\)\] {
        color: #ffffff !important;
      }

      /* Light theme scrollbar */
      html[data-theme="light"] ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }

      html[data-theme="light"] ::-webkit-scrollbar-thumb {
        background: var(--bg-tertiary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
